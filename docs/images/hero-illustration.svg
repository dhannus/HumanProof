<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img">
  <title>HHTTPS: Identity once, verified everywhere</title>
  <desc>Illustration showing a single verified user identity flowing from hhttps.org issuer to multiple platforms with role badges.</desc>

  <!-- Background -->
  <rect width="1200" height="600" fill="#F8F1E4"/>

  <!-- Decorative grid -->
  <g opacity="0.04" stroke="#2D2823" stroke-width="0.5">
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="900" y1="0" x2="900" y2="600"/>
  </g>

  <!-- Title -->
  <text x="600" y="80" font-family="Fraunces, Georgia, serif" font-size="38" font-weight="500" text-anchor="middle" fill="#2D2823" font-style="italic">Identity once.</text>
  <text x="600" y="125" font-family="Fraunces, Georgia, serif" font-size="38" font-weight="500" text-anchor="middle" fill="#C97D5B" font-style="italic">Verified everywhere.</text>

  <!-- Center: User + HHTTPS issuer -->
  <g transform="translate(600, 320)">
    <!-- Outer ring (issuer) -->
    <circle cx="0" cy="0" r="100" fill="#FCFAF5" stroke="#C97D5B" stroke-width="2"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#C97D5B" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.4" transform="scale(1.15)"/>

    <!-- HHTTPS Logo mark -->
    <rect x="-35" y="-50" width="70" height="70" rx="18" fill="#C97D5B"/>
    <text x="0" y="-2" font-family="Fraunces, Georgia, serif" font-size="46" font-weight="600" text-anchor="middle" fill="#FCFAF5">H</text>

    <!-- User label -->
    <text x="0" y="48" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#2D2823">hhttps.org</text>
    <text x="0" y="68" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" text-anchor="middle" fill="#7A6F62" letter-spacing="0.5">YOUR IDENTITY</text>

    <!-- Outer label -->
    <text x="0" y="-130" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" font-weight="500" text-anchor="middle" fill="#A86246" letter-spacing="1.5">ONE PASSKEY</text>
  </g>

  <!-- Platform 1: top-left (Q&A) -->
  <g transform="translate(220, 230)">
    <rect x="-90" y="-50" width="180" height="100" rx="14" fill="#FCFAF5" stroke="#2D2823" stroke-width="0.5" stroke-opacity="0.15"/>
    <rect x="-90" y="-50" width="180" height="36" rx="14" fill="#EDE0C8"/>
    <rect x="-90" y="-26" width="180" height="12" fill="#EDE0C8"/>
    <text x="-72" y="-28" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#2D2823">ask.iamhmn.org</text>
    <circle cx="-72" cy="6" r="11" fill="#A8B89E"/>
    <text x="-72" y="10" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle" fill="#FCFAF5">💻</text>
    <text x="-54" y="2" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#2D2823">Developer</text>
    <text x="-54" y="16" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" fill="#7A6F62">Trust 72</text>
    <text x="-72" y="40" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7A6F62">Q&amp;A platform</text>
  </g>

  <!-- Platform 2: top-right (Forum) -->
  <g transform="translate(980, 230)">
    <rect x="-90" y="-50" width="180" height="100" rx="14" fill="#FCFAF5" stroke="#2D2823" stroke-width="0.5" stroke-opacity="0.15"/>
    <rect x="-90" y="-50" width="180" height="36" rx="14" fill="#EDE0C8"/>
    <rect x="-90" y="-26" width="180" height="12" fill="#EDE0C8"/>
    <text x="-72" y="-28" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#2D2823">forum.example.de</text>
    <circle cx="-72" cy="6" r="11" fill="#F2B894"/>
    <text x="-72" y="10" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle" fill="#2D2823">🎨</text>
    <text x="-54" y="2" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#2D2823">Creative</text>
    <text x="-54" y="16" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" fill="#7A6F62">Trust 58</text>
    <text x="-72" y="40" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7A6F62">Community forum</text>
  </g>

  <!-- Platform 3: bottom-left (Petition) -->
  <g transform="translate(220, 410)">
    <rect x="-90" y="-50" width="180" height="100" rx="14" fill="#FCFAF5" stroke="#2D2823" stroke-width="0.5" stroke-opacity="0.15"/>
    <rect x="-90" y="-50" width="180" height="36" rx="14" fill="#EDE0C8"/>
    <rect x="-90" y="-26" width="180" height="12" fill="#EDE0C8"/>
    <text x="-72" y="-28" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#2D2823">petition.bund.de</text>
    <circle cx="-72" cy="6" r="11" fill="#5BAF6B"/>
    <text x="-72" y="10" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle" fill="#FCFAF5">🧑</text>
    <text x="-54" y="2" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#2D2823">Citizen</text>
    <text x="-54" y="16" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" fill="#7A6F62">Trust 85</text>
    <text x="-72" y="40" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7A6F62">Petition platform</text>
  </g>

  <!-- Platform 4: bottom-right (Newsroom) -->
  <g transform="translate(980, 410)">
    <rect x="-90" y="-50" width="180" height="100" rx="14" fill="#FCFAF5" stroke="#2D2823" stroke-width="0.5" stroke-opacity="0.15"/>
    <rect x="-90" y="-50" width="180" height="36" rx="14" fill="#EDE0C8"/>
    <rect x="-90" y="-26" width="180" height="12" fill="#EDE0C8"/>
    <text x="-72" y="-28" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#2D2823">comments.zeitung.de</text>
    <circle cx="-72" cy="6" r="11" fill="#A8B89E"/>
    <text x="-72" y="10" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle" fill="#FCFAF5">📰</text>
    <text x="-54" y="2" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#2D2823">Journalist</text>
    <text x="-54" y="16" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" fill="#7A6F62">Trust 88</text>
    <text x="-72" y="40" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7A6F62">News comments</text>
  </g>

  <!-- Connection lines from center to each platform -->
  <g fill="none" stroke="#C97D5B" stroke-width="1.5" stroke-linecap="round" opacity="0.5">
    <path d="M 510 295 Q 400 240 310 230"/>
    <path d="M 690 295 Q 800 240 890 230"/>
    <path d="M 510 365 Q 400 400 310 410"/>
    <path d="M 690 365 Q 800 400 890 410"/>
  </g>

  <!-- Small role indicators near each line midpoint -->
  <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" fill="#A86246" letter-spacing="0.5">
    <text x="395" y="252" text-anchor="middle">role + trust</text>
    <text x="805" y="252" text-anchor="middle">role + trust</text>
    <text x="395" y="395" text-anchor="middle">role + trust</text>
    <text x="805" y="395" text-anchor="middle">role + trust</text>
  </g>

  <!-- Footer note -->
  <text x="600" y="555" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle" fill="#7A6F62">Each platform sees a different pseudonym. No name. No email. No tracking.</text>
</svg>
