<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img">
  <title>HHTTPS system architecture</title>
  <desc>System diagram showing four main components: HHTTPS issuer server, browser extension, third-party platforms, and user device, with data flows between them.</desc>

  <!-- Background -->
  <rect width="1200" height="800" fill="#F8F1E4"/>

  <!-- Title -->
  <text x="600" y="50" font-family="Fraunces, Georgia, serif" font-size="26" font-weight="500" text-anchor="middle" fill="#2D2823">HHTTPS system architecture</text>
  <text x="600" y="78" font-family="Inter, system-ui, sans-serif" font-size="14" text-anchor="middle" fill="#7A6F62">Four moving parts. The user's browser is the orchestrator.</text>

  <!-- ──────── Components ──────── -->

  <!-- 1. HHTTPS Issuer (top center) -->
  <g transform="translate(600, 180)">
    <rect x="-180" y="-70" width="360" height="140" rx="18" fill="#FCFAF5" stroke="#C97D5B" stroke-width="2"/>

    <!-- Icon: server stack -->
    <g transform="translate(-130, -10)">
      <rect x="-22" y="-32" width="44" height="14" rx="3" fill="#C97D5B"/>
      <circle cx="-14" cy="-25" r="2" fill="#5BAF6B"/>
      <rect x="-22" y="-14" width="44" height="14" rx="3" fill="#C97D5B"/>
      <circle cx="-14" cy="-7" r="2" fill="#5BAF6B"/>
      <rect x="-22" y="4" width="44" height="14" rx="3" fill="#C97D5B"/>
      <circle cx="-14" cy="11" r="2" fill="#5BAF6B"/>
    </g>

    <text x="-60" y="-30" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="600" fill="#2D2823">HHTTPS Issuer</text>
    <text x="-60" y="-12" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#A86246">hhttps.org</text>

    <line x1="-60" y1="0" x2="160" y2="0" stroke="#2D2823" stroke-opacity="0.1" stroke-width="0.5"/>

    <text x="-60" y="18" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#4A413A">• Identity registration (passkey, role verification)</text>
    <text x="-60" y="34" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#4A413A">• OAuth/OIDC provider</text>
    <text x="-60" y="50" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#4A413A">• Content signature service</text>
  </g>

  <!-- 2. Browser Extension (left middle) -->
  <g transform="translate(220, 460)">
    <rect x="-160" y="-90" width="320" height="180" rx="18" fill="#FCFAF5" stroke="#A8B89E" stroke-width="2"/>

    <!-- Icon: browser puzzle -->
    <g transform="translate(-115, -50)">
      <rect x="-20" y="-15" width="40" height="32" rx="4" fill="#A8B89E"/>
      <path d="M 8 -15 L 8 -8 L 14 -8 Q 18 -8 18 -4 Q 18 0 14 0 L 8 0 L 8 17"
            stroke="#FCFAF5" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </g>

    <text x="-60" y="-65" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#2D2823">Browser Extension</text>
    <text x="-60" y="-48" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#5F5E5A">v1.4.3</text>

    <line x1="-130" y1="-30" x2="130" y2="-30" stroke="#2D2823" stroke-opacity="0.1" stroke-width="0.5"/>

    <text x="-130" y="-12" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#4A413A">• Stores identity locally</text>
    <text x="-130" y="6" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#4A413A">• Renders inline seals on any site</text>
    <text x="-130" y="24" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#4A413A">• Right-click signing in text fields</text>
    <text x="-130" y="42" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#4A413A">• Auto-refresh tokens</text>
    <text x="-130" y="60" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#4A413A">• OAuth auto-consent (Phase 3c)</text>
  </g>

  <!-- 3. Third-party Platforms (right middle) -->
  <g transform="translate(980, 460)">
    <rect x="-160" y="-90" width="320" height="180" rx="18" fill="#FCFAF5" stroke="#F2B894" stroke-width="2"/>

    <!-- Icon: globe / multiple sites -->
    <g transform="translate(-115, -50)">
      <circle cx="0" cy="0" r="18" fill="#F2B894"/>
      <line x1="-18" y1="0" x2="18" y2="0" stroke="#FCFAF5" stroke-width="1.2"/>
      <line x1="0" y1="-18" x2="0" y2="18" stroke="#FCFAF5" stroke-width="1.2"/>
      <ellipse cx="0" cy="0" rx="9" ry="18" fill="none" stroke="#FCFAF5" stroke-width="1.2"/>
    </g>

    <text x="-60" y="-65" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#2D2823">Third-party Platforms</text>
    <text x="-60" y="-48" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#A86246">your platform here</text>

    <line x1="-130" y1="-30" x2="130" y2="-30" stroke="#2D2823" stroke-opacity="0.1" stroke-width="0.5"/>

    <text x="-130" y="-12" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#4A413A">• Implement OAuth client</text>
    <text x="-130" y="6" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#4A413A">• Receive pseudonymous user ID</text>
    <text x="-130" y="24" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#4A413A">• Read user role + trust score</text>
    <text x="-130" y="42" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#4A413A">• Display role badge on content</text>
    <text x="-130" y="60" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#4A413A">• Example: ask.iamhmn.org</text>
  </g>

  <!-- 4. User Device (bottom center) -->
  <g transform="translate(600, 700)">
    <rect x="-180" y="-50" width="360" height="100" rx="18" fill="#FCFAF5" stroke="#2D2823" stroke-width="2"/>

    <!-- Icon: phone with passkey -->
    <g transform="translate(-135, 0)">
      <rect x="-15" y="-26" width="30" height="44" rx="5" fill="#2D2823"/>
      <rect x="-12" y="-23" width="24" height="34" rx="2" fill="#FCFAF5"/>
      <circle cx="0" cy="-5" r="6" fill="#C97D5B"/>
      <path d="M -3 -5 L -1 -3 L 3 -8" stroke="#FCFAF5" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    </g>

    <text x="-80" y="-22" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#2D2823">User Device</text>
    <text x="-80" y="-4" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#5F5E5A">phone / laptop with passkey</text>
    <text x="-80" y="22" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#4A413A">The cryptographic anchor of the entire system.</text>
  </g>

  <!-- ──────── Connection lines ──────── -->

  <!-- Issuer ↔ Extension -->
  <g fill="none" stroke="#C97D5B" stroke-width="1.5" stroke-linecap="round">
    <path d="M 480 230 Q 380 320 280 370"/>
    <path d="M 280 360 L 290 365 L 285 374" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M 290 380 L 280 385 L 290 394" stroke-width="1.5" stroke-linejoin="round"/>
  </g>
  <g transform="translate(335, 290)">
    <rect x="-58" y="-12" width="116" height="24" rx="12" fill="#FCFAF5" stroke="#C97D5B" stroke-width="0.5"/>
    <text x="0" y="4" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" text-anchor="middle" fill="#A86246">identity sync</text>
  </g>

  <!-- Issuer ↔ Platform -->
  <g fill="none" stroke="#C97D5B" stroke-width="1.5" stroke-linecap="round">
    <path d="M 720 230 Q 820 320 920 370"/>
    <path d="M 920 360 L 910 365 L 915 374" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M 910 380 L 920 385 L 910 394" stroke-width="1.5" stroke-linejoin="round"/>
  </g>
  <g transform="translate(865, 290)">
    <rect x="-58" y="-12" width="116" height="24" rx="12" fill="#FCFAF5" stroke="#C97D5B" stroke-width="0.5"/>
    <text x="0" y="4" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" text-anchor="middle" fill="#A86246">OAuth flow</text>
  </g>

  <!-- Extension ↔ Platform -->
  <g fill="none" stroke="#A8B89E" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="6 4">
    <line x1="380" y1="460" x2="820" y2="460"/>
  </g>
  <g transform="translate(600, 460)">
    <rect x="-100" y="-12" width="200" height="24" rx="12" fill="#FCFAF5" stroke="#A8B89E" stroke-width="0.5"/>
    <text x="0" y="4" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" text-anchor="middle" fill="#889982">renders seals on platform</text>
  </g>

  <!-- Extension ↔ Device -->
  <g fill="none" stroke="#2D2823" stroke-width="1.5" stroke-linecap="round" opacity="0.4">
    <path d="M 280 560 Q 380 630 480 685"/>
    <path d="M 480 678 L 489 683 L 484 692" stroke-width="1.5" stroke-linejoin="round" opacity="1"/>
  </g>
  <g transform="translate(345, 625)">
    <rect x="-58" y="-12" width="116" height="24" rx="12" fill="#FCFAF5" stroke="#2D2823" stroke-width="0.5" stroke-opacity="0.4"/>
    <text x="0" y="4" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" text-anchor="middle" fill="#5F5E5A">passkey auth</text>
  </g>

  <!-- Platform ↔ Device (indirect via browser) -->
  <g fill="none" stroke="#F2B894" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="6 4">
    <path d="M 920 560 Q 820 630 720 685"/>
    <path d="M 720 678 L 711 683 L 716 692" stroke-width="1.5" stroke-linejoin="round"/>
  </g>
  <g transform="translate(855, 625)">
    <rect x="-58" y="-12" width="116" height="24" rx="12" fill="#FCFAF5" stroke="#F2B894" stroke-width="0.5"/>
    <text x="0" y="4" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" text-anchor="middle" fill="#A86246">user interacts</text>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 760)">
    <line x1="0" y1="0" x2="24" y2="0" stroke="#C97D5B" stroke-width="1.5" stroke-linecap="round"/>
    <text x="32" y="4" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#7A6F62">protocol traffic</text>
    <line x1="170" y1="0" x2="194" y2="0" stroke="#A8B89E" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="6 4"/>
    <text x="202" y="4" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#7A6F62">user-visible interaction</text>
  </g>
</svg>
