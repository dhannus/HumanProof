<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HumanProof</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: #0d0f0a;
      color: #e8eae0;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
    }

    .header {
      background: #13150f;
      border-bottom: 1px solid #222518;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 22px; height: 22px;
      border: 2px solid #c6ff00;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: #c6ff00; font-weight: bold;
      flex-shrink: 0;
    }
    .header h1 { font-size: 13px; color: #c6ff00; letter-spacing: 0.08em; }
    .header p  { font-size: 10px; color: #5a6050; margin-top: 2px; }

    .body { padding: 16px; }

    .poc-banner {
      background: rgba(255,159,64,0.08);
      border: 1px solid rgba(255,159,64,0.35);
      padding: 8px 12px;
      font-size: 10px;
      color: #ff9f40;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .status-card {
      border: 1px solid #222518;
      background: #13150f;
      padding: 14px;
      margin-bottom: 12px;
    }
    .status-label {
      font-size: 9px; letter-spacing: 0.18em;
      text-transform: uppercase; color: #5a6050; margin-bottom: 8px;
    }
    .status-value {
      font-size: 15px; font-weight: bold;
      display: flex; align-items: center; gap: 8px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .dot-inactive { background: #5a6050; }
    .dot-active   { background: #c6ff00; box-shadow: 0 0 6px #c6ff00; }
    .dot-pending  { background: #ff9f40; animation: blink 0.8s infinite; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .meta-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin-bottom: 12px;
    }
    .meta-cell {
      border: 1px solid #222518; background: #13150f; padding: 10px;
    }
    .meta-cell .cl { font-size: 9px; letter-spacing: 0.14em;
      text-transform: uppercase; color: #5a6050; margin-bottom: 4px; }
    .meta-cell .cv { font-size: 12px; }
    .cv-green { color: #c6ff00; }
    .cv-muted { color: #5a6050; }

    .token-box {
      border: 1px solid #222518; background: #0a0c08;
      padding: 10px; margin-bottom: 12px;
    }
    .token-box .tl {
      font-size: 9px; letter-spacing: 0.14em;
      text-transform: uppercase; color: #5a6050; margin-bottom: 6px;
    }
    .token-box .tv {
      font-size: 10px; color: #c6ff00; opacity: 0.75;
      word-break: break-all; line-height: 1.4;
    }

    .btn {
      width: 100%; padding: 10px; border: 1px solid;
      background: transparent; cursor: pointer;
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px; letter-spacing: 0.12em;
      text-transform: uppercase; margin-bottom: 8px;
      transition: background 0.15s, color 0.15s;
    }
    .btn:last-child { margin-bottom: 0; }
    .btn-primary { border-color: #c6ff00; color: #c6ff00; }
    .btn-primary:hover:not(:disabled) { background: #c6ff00; color: #0d0f0a; }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-danger { border-color: #ff3c6e; color: #ff3c6e; }
    .btn-danger:hover { background: rgba(255,60,110,0.12); }

    .footer {
      border-top: 1px solid #222518;
      padding: 8px 16px;
      display: flex; justify-content: space-between;
    }
    .footer a {
      font-size: 9px; letter-spacing: 0.1em;
      text-transform: uppercase; color: #5a6050; text-decoration: none;
    }
    .footer a:hover { color: #c6ff00; }
    .footer span { font-size: 9px; color: #5a6050; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">H</div>
    <div>
      <h1>HUMANPROOF</h1>
      <p>Anonymous human verification</p>
    </div>
  </div>

  <div class="body">

    <div class="poc-banner">
      ⚠ Proof of Concept — simulated ZKP.<br>
      No real identity data is used or transmitted.
    </div>

    <!-- Status -->
    <div class="status-card">
      <div class="status-label">Status</div>
      <div class="status-value">
        <div class="dot dot-inactive" id="dot"></div>
        <span id="statusText">Not verified</span>
      </div>
    </div>

    <!-- Meta (shown when active) -->
    <div class="meta-grid hidden" id="metaGrid">
      <div class="meta-cell">
        <div class="cl">Type</div>
        <div class="cv cv-green">Human Label</div>
      </div>
      <div class="meta-cell">
        <div class="cl">Scope</div>
        <div class="cv">Session</div>
      </div>
      <div class="meta-cell">
        <div class="cl">Expires in</div>
        <div class="cv" id="expiresIn">—</div>
      </div>
      <div class="meta-cell">
        <div class="cl">Age group</div>
        <div class="cv cv-muted">Not disclosed</div>
      </div>
    </div>

    <!-- Token preview (shown when active) -->
    <div class="token-box hidden" id="tokenBox">
      <div class="tl">Label preview (truncated)</div>
      <div class="tv" id="tokenPreview">—</div>
    </div>

    <!-- Buttons -->
    <button class="btn btn-primary" id="btnVerify">▶ Generate Human Label</button>
    <button class="btn btn-danger hidden" id="btnRevoke">✕ Revoke Label</button>

  </div>

  <div class="footer">
    <a href="https://github.com/dhannus/humanproof" target="_blank">GitHub</a>
    <a href="https://github.com/dhannus/humanproof/blob/main/docs/architecture.md" target="_blank">How it works</a>
    <span>v0.1.0-poc</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
