<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HumanProof</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      min-height: 200px;
      background: #0d0f0a;
      color: #e8eae0;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
    }

    /* Header */
    .header {
      background: #13150f;
      border-bottom: 1px solid #222518;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 20px;
      height: 20px;
      border: 2px solid #c6ff00;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #c6ff00;
      flex-shrink: 0;
    }
    .header-text h1 {
      font-size: 13px;
      font-weight: bold;
      color: #c6ff00;
      letter-spacing: 0.08em;
    }
    .header-text p {
      font-size: 10px;
      color: #5a6050;
      letter-spacing: 0.04em;
    }

    /* Status area */
    .status-area {
      padding: 20px 16px;
    }

    .status-card {
      border: 1px solid #222518;
      background: #13150f;
      padding: 14px;
      margin-bottom: 14px;
    }

    .status-label {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #5a6050;
      margin-bottom: 8px;
    }

    .status-value {
      font-size: 15px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.active  { background: #c6ff00; box-shadow: 0 0 6px #c6ff00; }
    .status-dot.inactive { background: #5a6050; }
    .status-dot.pending { background: #ff9f40; animation: blink 1s infinite; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Label info */
    .label-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    .info-cell {
      border: 1px solid #222518;
      background: #13150f;
      padding: 10px;
    }
    .info-cell .cell-label {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #5a6050;
      margin-bottom: 4px;
    }
    .info-cell .cell-value {
      font-size: 12px;
      color: #e8eae0;
    }
    .info-cell .cell-value.green { color: #c6ff00; }
    .info-cell .cell-value.muted { color: #5a6050; }

    /* Token preview */
    .token-preview {
      border: 1px solid #222518;
      background: #0a0c08;
      padding: 10px;
      margin-bottom: 14px;
      word-break: break-all;
    }
    .token-preview .token-label {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #5a6050;
      margin-bottom: 6px;
    }
    .token-preview .token-value {
      font-size: 10px;
      color: #c6ff00;
      opacity: 0.7;
      line-height: 1.4;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 10px;
      border: 1px solid;
      background: transparent;
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      margin-bottom: 8px;
    }
    .btn:last-child { margin-bottom: 0; }

    .btn-primary {
      border-color: #c6ff00;
      color: #c6ff00;
    }
    .btn-primary:hover {
      background: #c6ff00;
      color: #0d0f0a;
    }
    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-secondary {
      border-color: #222518;
      color: #5a6050;
    }
    .btn-secondary:hover {
      border-color: #5a6050;
      color: #e8eae0;
    }

    /* Footer */
    .footer {
      border-top: 1px solid #222518;
      padding: 8px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer a {
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #5a6050;
      text-decoration: none;
    }
    .footer a:hover { color: #c6ff00; }
    .version {
      font-size: 9px;
      color: #5a6050;
    }

    /* POC Banner */
    .poc-banner {
      background: rgba(255, 159, 64, 0.08);
      border: 1px solid rgba(255, 159, 64, 0.3);
      padding: 8px 12px;
      margin-bottom: 14px;
      font-size: 10px;
      color: #ff9f40;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">H</div>
    <div class="header-text">
      <h1>HUMANPROOF</h1>
      <p>Anonymous human verification</p>
    </div>
  </div>

  <div class="status-area">

    <div class="poc-banner">
      ⚠ Proof of Concept — Simulated ZKP.<br>No real identity data used or transmitted.
    </div>

    <div class="status-card">
      <div class="status-label">Current Status</div>
      <div class="status-value" id="statusValue">
        <div class="status-dot inactive" id="statusDot"></div>
        <span id="statusText">Not verified</span>
      </div>
    </div>

    <div class="label-info" id="labelInfo" style="display:none">
      <div class="info-cell">
        <div class="cell-label">Type</div>
        <div class="cell-value green">Human Label</div>
      </div>
      <div class="info-cell">
        <div class="cell-label">Scope</div>
        <div class="cell-value">Session</div>
      </div>
      <div class="info-cell">
        <div class="cell-label">Expires in</div>
        <div class="cell-value" id="expiresIn">—</div>
      </div>
      <div class="info-cell">
        <div class="cell-label">Age group</div>
        <div class="cell-value muted">Not disclosed</div>
      </div>
    </div>

    <div class="token-preview" id="tokenPreview" style="display:none">
      <div class="token-label">Label preview (truncated)</div>
      <div class="token-value" id="tokenValue">—</div>
    </div>

    <button class="btn btn-primary" id="verifyBtn">
      ▶ Generate Human Label
    </button>
    <button class="btn btn-secondary" id="revokeBtn" style="display:none">
      ✕ Revoke Label
    </button>

  </div>

  <div class="footer">
    <a href="https://github.com/dhannus/humanproof" target="_blank">GitHub</a>
    <a href="https://github.com/dhannus/humanproof/blob/main/docs/architecture.md" target="_blank">How it works</a>
    <span class="version">v0.1.0-poc</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
